# Мониторинг (roadmap § 10): Prometheus + Grafana отдельным compose, как Langfuse.
# network_mode: host — API слушает только 127.0.0.1:8100, из bridge-сети
# (host.docker.internal) loopback недоступен; в host-режиме Prometheus скрейпит
# 127.0.0.1:8100 напрямую. Оба сервиса сами привязаны к 127.0.0.1 (не наружу).
# Grafana на :3001 (3000 занят соседним проектом).
name: rag-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.listen-address=127.0.0.1:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    network_mode: host
    depends_on:
      - prometheus
    environment:
      GF_SERVER_HTTP_ADDR: "127.0.0.1"
      GF_SERVER_HTTP_PORT: "3001"
      GF_SECURITY_ADMIN_PASSWORD: ${RAG_GRAFANA_PASSWORD:-grafana-admin-2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  prom_data:
  grafana_data:
