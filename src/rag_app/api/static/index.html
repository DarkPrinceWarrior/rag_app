<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rag_app — перевод документации EN→RU</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f4f5f7; color: #1a1f2b; }
  header { background: #101725; color: #fff; padding: 14px 28px; display: flex; align-items: baseline; gap: 14px; }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header span { color: #8b97ad; font-size: 13px; }
  main { max-width: 1080px; margin: 24px auto; padding: 0 16px; }
  .upload { background: #fff; border: 1px dashed #b8c0cf; border-radius: 10px; padding: 22px; text-align: center; margin-bottom: 20px; }
  .upload.drag { border-color: #2563eb; background: #eef4ff; }
  .upload input { display: none; }
  .btn { display: inline-block; background: #2563eb; color: #fff; border: 0; border-radius: 7px; padding: 9px 18px; font-size: 14px; cursor: pointer; }
  .btn:disabled { opacity: .5; cursor: default; }
  .hint { color: #6b7485; font-size: 13px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(16,23,37,.08); }
  th, td { padding: 10px 14px; text-align: left; font-size: 14px; border-bottom: 1px solid #eceff4; }
  th { background: #f9fafc; color: #5b6574; font-weight: 600; font-size: 12.5px; text-transform: uppercase; letter-spacing: .03em; }
  tr:last-child td { border-bottom: 0; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 12px; font-weight: 600; }
  .b-wait { background: #eef1f6; color: #5b6574; }
  .b-run  { background: #fff4dd; color: #92600a; }
  .b-done { background: #e3f6e8; color: #176b33; }
  .b-err  { background: #fde8e8; color: #b3261e; }
  .progress { background: #eceff4; border-radius: 99px; height: 7px; width: 130px; overflow: hidden; }
  .progress i { display: block; height: 100%; background: #2563eb; border-radius: 99px; transition: width .4s; }
  .small { color: #6b7485; font-size: 12.5px; }
  a { color: #2563eb; text-decoration: none; }
  .err-text { color: #b3261e; font-size: 12.5px; max-width: 320px; }
  .empty { text-align: center; color: #6b7485; padding: 36px; }
</style>
</head>
<body>
<header>
  <h1>rag_app</h1>
  <span>перевод и анализ технической документации EN→RU</span>
  <a href="/chat" style="margin-left:auto;color:#9db4e8;text-decoration:none;font-size:14px">Чат с документами →</a>
</header>
<main>
  <div class="upload" id="drop">
    <button class="btn" id="pick">Загрузить документ</button>
    <input type="file" id="file" accept=".pdf,.docx,.xlsx,.pptx">
    <div class="hint">или перетащите файл сюда · до 200 МБ · PDF (включая сканы), DOCX, XLSX, PPTX</div>
    <div class="hint" id="msg"></div>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
    <input id="libsearch" placeholder="Поиск по библиотеке (гибридный: смысл + термины)…"
           style="flex:1;padding:9px 13px;border:1px solid #c9d1de;border-radius:8px;font-size:14px">
    <select id="folderfilter" style="padding:9px 10px;border:1px solid #c9d1de;border-radius:8px;font-size:13.5px">
      <option value="">Все папки</option>
    </select>
    <button class="btn" id="newfolder" style="background:#475569">+ папка</button>
  </div>
  <div id="searchresults"></div>
  <table>
    <thead>
      <tr><th>Документ</th><th>Стр.</th><th>Статус</th><th>Прогресс</th><th>Скачать</th><th>Папка</th><th></th></tr>
    </thead>
    <tbody id="rows"><tr><td colspan="7" class="empty">Загрузка…</td></tr></tbody>
  </table>
</main>
<script>
const STATUS = {
  uploaded:   ["в очереди", "b-wait"],
  parsing:    ["парсинг", "b-run"],
  parsed:     ["распарсен", "b-run"],
  translating:["перевод", "b-run"],
  translated: ["переведён", "b-run"],
  exporting:  ["экспорт", "b-run"],
  done:       ["готово", "b-done"],
  error:      ["ошибка", "b-err"],
};
const rows = document.getElementById("rows");
const msg = document.getElementById("msg");
const fileInput = document.getElementById("file");
const drop = document.getElementById("drop");
document.getElementById("pick").onclick = () => fileInput.click();
fileInput.onchange = () => fileInput.files[0] && upload(fileInput.files[0]);
drop.ondragover = e => { e.preventDefault(); drop.classList.add("drag"); };
drop.ondragleave = () => drop.classList.remove("drag");
drop.ondrop = e => { e.preventDefault(); drop.classList.remove("drag"); e.dataTransfer.files[0] && upload(e.dataTransfer.files[0]); };

async function upload(file) {
  msg.textContent = "Загрузка « " + file.name + " »…";
  const fd = new FormData();
  fd.append("file", file);
  try {
    const r = await fetch("/api/documents", { method: "POST", body: fd });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.status); }
    msg.textContent = "";
    refresh();
  } catch (e) { msg.textContent = "Ошибка: " + e.message; }
  fileInput.value = "";
}

async function retry(id) { await fetch(`/api/documents/${id}/retry`, { method: "POST" }); refresh(); }

function esc(s) { const d = document.createElement("span"); d.textContent = s || ""; return d.innerHTML; }

let folders = [];
async function loadFolders() {
  folders = await (await fetch("/api/folders")).json();
  const ff = document.getElementById("folderfilter");
  const cur = ff.value;
  ff.innerHTML = '<option value="">Все папки</option>' +
    folders.map(f => `<option value="${f.id}">${esc(f.name)} (${f.documents})</option>`).join("");
  ff.value = cur;
}
document.getElementById("newfolder").onclick = async () => {
  const name = prompt("Название папки:");
  if (!name) return;
  await fetch("/api/folders", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name }) });
  loadFolders();
};
document.getElementById("folderfilter").onchange = refresh;

async function moveDoc(id, folderId) {
  await fetch(`/api/documents/${id}/folder`, {
    method: "PATCH", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ folder_id: folderId || null }),
  });
  loadFolders();
}

const searchBox = document.getElementById("libsearch");
const searchOut = document.getElementById("searchresults");
let searchTimer = null;
searchBox.oninput = () => {
  clearTimeout(searchTimer);
  const text = searchBox.value.trim();
  if (text.length < 3) { searchOut.innerHTML = ""; return; }
  searchTimer = setTimeout(async () => {
    searchOut.innerHTML = '<div class="small" style="padding:8px">Ищу…</div>';
    const ff = document.getElementById("folderfilter").value;
    const url = `/api/search?q=${encodeURIComponent(text)}${ff ? "&folder_id=" + ff : ""}`;
    try {
      const hits = await (await fetch(url)).json();
      searchOut.innerHTML = hits.length ? hits.map(h => `
        <div style="background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(16,23,37,.06)">
          <a href="/view?id=${h.document_id}"><b>${esc(h.filename)}</b></a>
          <span class="small"> ${esc(h.heading_path)}${h.page_start !== null ? " · стр. " + (h.page_start + 1) : ""}</span>
          <div class="small" style="color:#3a4254;margin-top:4px">${esc(h.snippet)}…</div>
        </div>`).join("")
        : '<div class="small" style="padding:8px">Ничего не найдено</div>';
    } catch (e) { searchOut.innerHTML = '<div class="small" style="padding:8px">Поиск недоступен: ' + esc(e.message) + "</div>"; }
  }, 400);
};

async function refresh() {
  try {
    const docs = await (await fetch("/api/documents")).json();
    const ff = document.getElementById("folderfilter").value;
    const visible = ff ? docs.filter(d => d.folder_id === ff) : docs;
    if (!visible.length) { rows.innerHTML = '<tr><td colspan="7" class="empty">Документов нет — загрузите первый</td></tr>'; return; }
    rows.innerHTML = visible.map(d => {
      const [label, cls] = STATUS[d.status] || [d.status, "b-wait"];
      const pct = d.segment_count ? Math.round(100 * d.translated_count / d.segment_count) : 0;
      const prog = ["translating","translated","exporting","done"].includes(d.status)
        ? `<div class="progress"><i style="width:${d.status==="done"?100:pct}%"></i></div><span class="small">${d.translated_count}/${d.segment_count}</span>`
        : `<span class="small">—</span>`;
      const NAMES = { docx: "DOCX (RU)", pdf: "PDF (RU)", pdf_dual: "PDF (EN+RU)", source: "файл (RU)" };
      const links = [`<a href="/api/documents/${d.id}/download/original">оригинал</a>`];
      for (const k of d.exports) links.push(`<a href="/api/documents/${d.id}/download/${k}"><b>${NAMES[k]}</b></a>`);
      const review = d.review_count > 0
        ? `<div class="small" style="color:#92600a">⚠ проверить числа: ${d.review_count}</div>` : "";
      const extra = d.status === "error"
        ? `<div class="err-text">${esc(d.error)}</div><a href="#" onclick="retry('${d.id}');return false">повторить</a>` : "";
      const folderSel = `<select class="small" style="max-width:110px" onchange="moveDoc('${d.id}', this.value)">
        <option value="">—</option>
        ${folders.map(f => `<option value="${f.id}" ${d.folder_id === f.id ? "selected" : ""}>${esc(f.name)}</option>`).join("")}
      </select>`;
      const chatLink = d.status === "done" ? ` · <a href="/chat?doc=${d.id}">чат</a>` : "";
      return `<tr>
        <td><a href="/view?id=${d.id}">${esc(d.filename)}</a>
          <div class="small">${new Date(d.created_at).toLocaleString("ru-RU")} · ${(d.size_bytes/1048576).toFixed(1)} МБ · ${esc(d.kind)}${chatLink}</div>${review}</td>
        <td>${d.page_count ?? "—"}</td>
        <td><span class="badge ${cls}">${label}</span></td>
        <td>${prog}</td>
        <td>${links.join(" · ")}</td>
        <td>${folderSel}</td>
        <td>${extra}</td>
      </tr>`;
    }).join("");
  } catch (e) { /* сервер перезапускается — пробуем дальше */ }
}
loadFolders().then(refresh);
setInterval(refresh, 2500);
</script>
</body>
</html>
