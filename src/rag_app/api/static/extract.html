<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rag_app — спецификации в таблицу</title>
<script src="/static/auth.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f4f5f7; color: #1a1f2b; }
  header { background: #101725; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header a { color: #8b97ad; text-decoration: none; font-size: 14px; }
  header b { font-size: 15px; flex: 1; }
  main { max-width: 1200px; margin: 18px auto; padding: 0 16px; }
  .bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  input, select { font-size: 14px; padding: 8px 10px; border: 1px solid #cdd4e0; border-radius: 7px; }
  input#q { flex: 1; min-width: 280px; }
  .btn { background: #2563eb; color: #fff; border: 0; border-radius: 7px; padding: 8px 16px; font-size: 13.5px; cursor: pointer; }
  .btn.secondary { background: #e7ebf2; color: #1a1f2b; }
  .btn:disabled { opacity: .5; }
  .hint { color: #6b7485; font-size: 13px; margin-bottom: 12px; }
  #status { color: #2563eb; font-size: 13px; margin-left: 8px; }
  table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 2px rgba(16,23,37,.06); }
  th, td { border: 1px solid #e1e6ef; padding: 7px 10px; font-size: 13.5px; text-align: left; vertical-align: top; }
  th { background: #eef1f6; font-weight: 600; }
  h2 { font-size: 16px; margin: 14px 0 8px; }
  .src { color: #6b7485; font-size: 12.5px; margin-top: 10px; }
  .src a { color: #2563eb; text-decoration: none; }
</style>
</head>
<body>
<header>
  <a href="/">← документы</a>
  <b>Спецификации в таблицу</b>
  <a href="/chat">чат →</a>
</header>
<main>
  <div class="hint">Запрос вроде «вытащи все спецификации труб в таблицу» или «сведи сроки и штрафы». Результат можно скачать в XLSX.</div>
  <div class="bar">
    <select id="docsel"><option value="">вся библиотека</option></select>
    <input id="q" placeholder="что свести в таблицу…" autofocus>
    <button class="btn" id="go">Извлечь</button>
    <button class="btn secondary" id="xlsx" disabled>Скачать XLSX</button>
    <span id="status"></span>
  </div>
  <div id="out"></div>
</main>
<script>
const docsel = document.getElementById("docsel");
const qel = document.getElementById("q");
const out = document.getElementById("out");
const statusEl = document.getElementById("status");
const xlsxBtn = document.getElementById("xlsx");
let current = null;

function esc(s) { const d = document.createElement("span"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

async function loadDocs() {
  const docs = await (await fetch("/api/documents")).json();
  for (const d of docs.filter(d => d.status === "done")) {
    const o = document.createElement("option");
    o.value = d.id; o.textContent = d.filename;
    docsel.appendChild(o);
  }
}

function render(t) {
  let html = `<h2>${esc(t.title)}</h2>`;
  if (!t.rows.length) { html += `<div class="hint">Данных по запросу не нашлось.</div>`; out.innerHTML = html; return; }
  html += "<table><thead><tr>" + t.columns.map(c => `<th>${esc(c)}</th>`).join("") + "</tr></thead><tbody>";
  html += t.rows.map(r => "<tr>" + (t.columns.length ? t.columns.map((_, i) => `<td>${esc(r[i])}</td>`).join("") : r.map(v => `<td>${esc(v)}</td>`).join("")) + "</tr>").join("");
  html += "</tbody></table>";
  if (t.sources && t.sources.length) {
    html += `<div class="src">Источники: ` + t.sources.map(s => {
      const seg = (s.segment_ids && s.segment_ids[0]) ? `&seg=${s.segment_ids[0]}` : "";
      const page = s.page ? ` · стр. ${s.page}` : "";
      return `<a href="/view?id=${s.document_id}${seg}&page=${s.page || ""}" target="_blank">[${s.n}] ${esc(s.filename)}${page}</a>`;
    }).join(" · ") + `</div>`;
  }
  out.innerHTML = html;
}

async function extract() {
  const query = qel.value.trim();
  if (!query) return;
  statusEl.textContent = "Извлекаю…"; xlsxBtn.disabled = true;
  try {
    const resp = await fetch("/api/extract/table", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, document_id: docsel.value || null }),
    });
    if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).detail || resp.status);
    current = await resp.json();
    render(current);
    xlsxBtn.disabled = !(current.rows && current.rows.length);
    statusEl.textContent = "";
  } catch (e) { statusEl.textContent = "Ошибка: " + e.message; }
}

async function downloadXlsx() {
  if (!current) return;
  statusEl.textContent = "Готовлю XLSX…";
  const resp = await fetch("/api/extract/xlsx", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title: current.title, columns: current.columns, rows: current.rows, sources: current.sources }),
  });
  const blob = await resp.blob();
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (current.title || "extract").slice(0, 60).replace(/[^\wа-яА-Я -]/g, "") + ".xlsx";
  a.click();
  URL.revokeObjectURL(a.href);
  statusEl.textContent = "";
}

document.getElementById("go").onclick = extract;
xlsxBtn.onclick = downloadXlsx;
qel.addEventListener("keydown", e => { if (e.key === "Enter") extract(); });
window.authReady.then(loadDocs);
</script>
</body>
</html>
