<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rag_app — чат с документами</title>
<script src="/static/auth.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f4f5f7; color: #1a1f2b; height: 100vh; display: flex; flex-direction: column; }
  header { background: #101725; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header a { color: #8b97ad; text-decoration: none; font-size: 14px; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header select { margin-left: auto; max-width: 360px; padding: 6px 10px; border-radius: 7px; border: 1px solid #2a3650; background: #1a2438; color: #dfe5ee; font-size: 13px; }
  main { flex: 1; overflow-y: auto; padding: 20px 16px; }
  .wrap { max-width: 860px; margin: 0 auto; }
  .msg { margin-bottom: 14px; display: flex; }
  .msg .bubble { max-width: 86%; padding: 11px 15px; border-radius: 12px; font-size: 14.5px; line-height: 1.55; white-space: pre-wrap; }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: #fff; box-shadow: 0 1px 3px rgba(16,23,37,.08); border-bottom-left-radius: 4px; }
  .cites { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .cite { display: inline-block; background: #eef4ff; color: #1d4ed8; font-size: 12px; border-radius: 99px; padding: 3px 10px; text-decoration: none; }
  .cite:hover { background: #dbe7ff; }
  .empty { text-align: center; color: #6b7485; padding: 60px 0; }
  footer { background: #fff; border-top: 1px solid #e3e7ee; padding: 12px 16px; }
  .inputrow { max-width: 860px; margin: 0 auto; display: flex; gap: 10px; }
  .inputrow textarea { flex: 1; resize: none; border: 1px solid #c9d1de; border-radius: 9px; padding: 10px 13px; font-size: 14.5px; font-family: inherit; height: 48px; }
  .inputrow textarea:focus { outline: none; border-color: #2563eb; }
  .btn { background: #2563eb; color: #fff; border: 0; border-radius: 9px; padding: 0 22px; font-size: 14px; cursor: pointer; }
  .btn:disabled { opacity: .5; }
  .status { max-width: 860px; margin: 6px auto 0; color: #6b7485; font-size: 12.5px; min-height: 16px; }
</style>
</head>
<body>
<header>
  <a href="/">← документы</a>
  <h1>Чат с документами</h1>
  <a href="/extract">таблица →</a>
  <select id="docsel"><option value="">Вся библиотека</option></select>
</header>
<main><div class="wrap" id="chatlog"><div class="empty">Задайте вопрос по переведённым документам — ответ придёт со ссылками на источники.</div></div></main>
<footer>
  <div class="inputrow">
    <textarea id="q" placeholder="Например: какое расчётное давление и при какой температуре?"></textarea>
    <button class="btn" id="send">Спросить</button>
  </div>
  <div class="status" id="status"></div>
</footer>
<script>
let sessionId = null;
const log = document.getElementById("chatlog");
const q = document.getElementById("q");
const sendBtn = document.getElementById("send");
const statusEl = document.getElementById("status");
const docsel = document.getElementById("docsel");

function esc(s) { const d = document.createElement("span"); d.textContent = s || ""; return d.innerHTML; }

async function loadDocs() {
  const docs = await (await fetch("/api/documents")).json();
  for (const d of docs.filter(d => d.status === "done")) {
    const o = document.createElement("option");
    o.value = d.id; o.textContent = d.filename;
    docsel.appendChild(o);
  }
  const pre = new URLSearchParams(location.search).get("doc");
  if (pre) docsel.value = pre;
}

function addMsg(role, html) {
  if (log.querySelector(".empty")) log.innerHTML = "";
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${html}</div>`;
  log.appendChild(div);
  div.scrollIntoView({ block: "end" });
  return div.querySelector(".bubble");
}

function renderCites(bubble, citations) {
  if (!citations.length) return;
  const box = document.createElement("div");
  box.className = "cites";
  box.innerHTML = citations.map(c => {
    const pages = c.page_start !== null ? ` · стр. ${c.page_start + 1}` : "";
    const label = `[${c.n}] ${esc(c.filename)}${pages}`;
    // якорь на процитированный фрагмент: первый сегмент чанка (+ страница как запасной)
    const seg = (c.segment_ids && c.segment_ids[0]) ? `&seg=${c.segment_ids[0]}` : "";
    const page = c.page_start !== null ? `&page=${c.page_start + 1}` : "";
    return `<a class="cite" href="/view?id=${c.document_id}${seg}${page}" target="_blank" title="${esc(c.heading_path)}">${label}</a>`;
  }).join("");
  bubble.appendChild(box);
}

async function send() {
  const text = q.value.trim();
  if (!text || sendBtn.disabled) return;
  q.value = "";
  addMsg("user", esc(text));
  const bubble = addMsg("bot", "");
  sendBtn.disabled = true;
  statusEl.textContent = "Ищу в документах…";
  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, session_id: sessionId, document_id: docsel.value || null }),
    });
    if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).detail || resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "", answer = "", trace = null;
    const addStep = (txt) => {
      if (!trace) {
        trace = document.createElement("div");
        trace.style.cssText = "font-size:12px;color:#8a8f98;margin:2px 0 4px;padding-left:6px;border-left:2px solid #2a2f3a;";
        bubble.closest(".msg").before(trace);
      }
      const d = document.createElement("div");
      d.textContent = txt;
      trace.appendChild(d);
    };
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0) {
        const line = buf.slice(0, i).trim();
        buf = buf.slice(i + 2);
        if (!line.startsWith("data: ")) continue;
        const ev = JSON.parse(line.slice(6));
        if (ev.type === "session") sessionId = ev.session_id;
        else if (ev.type === "mode") {
          if (ev.mode === "multi_hop") { statusEl.textContent = "🧭 Углублённый поиск…"; addStep("🧭 углублённый разбор запроса"); }
        }
        else if (ev.type === "step") { addStep("🔧 " + ev.tool + (ev.arg ? ": " + ev.arg : "")); }
        else if (ev.type === "agent_summary") {
          addStep("✓ собрано фрагментов: " + ev.chunks + " (шагов " + ev.iters + ", стоп: " + ev.stop + ")");
          statusEl.textContent = "Формулирую ответ…";
        }
        else if (ev.type === "delta") {
          if (!answer) statusEl.textContent = "";
          answer += ev.text;
          bubble.textContent = answer;
          bubble.closest(".msg").scrollIntoView({ block: "end" });
        }
        else if (ev.type === "done") renderCites(bubble, ev.citations);
        else if (ev.type === "error") { bubble.textContent = "Ошибка: " + ev.detail; }
      }
    }
  } catch (e) { bubble.textContent = "Ошибка: " + e.message; }
  sendBtn.disabled = false;
  statusEl.textContent = "";
  q.focus();
}

sendBtn.onclick = send;
q.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
docsel.onchange = () => { sessionId = null; };  // новая сессия при смене документа
window.authReady.then(loadDocs);
</script>
</body>
</html>
