# Stateless-инфраструктура этапа 1 (roadmap § 2, § 4.4).
# Порты смещены: 5432/8000/3000/8010 на a100 заняты другими проектами.
# Всё слушает только 127.0.0.1 — наружу смотрит лишь FastAPI (отдельно).
name: rag-app

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RAG_PG_USER:-rag}
      POSTGRES_PASSWORD: ${RAG_PG_PASSWORD:-rag-pg-2026}
      POSTGRES_DB: ${RAG_PG_DB:-rag_app}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_PG_USER:-rag} -d ${RAG_PG_DB:-rag_app}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${RAG_S3_ACCESS_KEY:-rag-minio}
      MINIO_ROOT_PASSWORD: ${RAG_S3_SECRET_KEY:-rag-minio-secret-2026}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # SSO (roadmap § 9, этап 5). База — наш Postgres (отдельная БД keycloak);
  # при развёртывании у заказчика: start (prod) + TLS + федерация AD/LDAP.
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    restart: unless-stopped
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${RAG_KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${RAG_KC_ADMIN_PASSWORD:-kc-admin-2026}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${RAG_PG_USER:-rag}
      KC_DB_PASSWORD: ${RAG_PG_PASSWORD:-rag-pg-2026}
      KC_HTTP_PORT: "8080"
      # фиксируем issuer (иначе он зависит от того, по какому хосту пришли,
      # и не совпадает с проверкой на бэкенде)
      KC_HOSTNAME: ${RAG_KC_HOSTNAME:-http://localhost:8180}
    ports:
      - "127.0.0.1:8180:8080"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro

volumes:
  pg_data:
  redis_data:
  minio_data:
